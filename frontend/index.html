<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100dvh;
        }

        .header {
            height: 55px;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 18px;
        }

        .welcome {
            text-align: center;
            margin-top: 80px;
            color: #ddd;
        }

        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 18px;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-message {
            background: #2f2f2f;
            color: white;
            padding: 13px 17px;
            border-radius: 22px;
            max-width: 78%;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bot-message {
            color: white;
            max-width: 88%;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing {
            color: #aaa;
            font-style: italic;
        }

        .input-area {
            padding: 10px;
            background: #000;
            flex-shrink: 0;
        }

        .input-box {
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border: 1px solid #555;
            border-radius: 28px;
            padding: 6px;
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
            padding: 13px;
        }

        input::placeholder {
            color: #aaa;
        }

        button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: white;
            color: black;
            font-size: 22px;
            font-weight: bold;
        }

        @media (min-width: 769px) {
            .chat-box, .input-area {
                max-width: 850px;
                width: 100%;
                margin: 0 auto;
            }

            .header {
                text-align: center;
            }
        }
    </style>
</head>

<body>

<div class="header">AI Chatbot</div>

<div id="chatBox" class="chat-box">
    <div class="welcome" id="welcomeBox">
        <h1>How can I help you today?</h1>
        <p>Ask anything and get an AI-generated response.</p>
    </div>
</div>

<div class="input-area">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Message AI Chatbot..." />
        <button id="sendBtn">↑</button>
    </div>
</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const sendBtn = document.getElementById("sendBtn");

sendBtn.addEventListener("pointerdown", function(event) {
    event.preventDefault();
});

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

function removeWelcome() {
    const welcomeBox = document.getElementById("welcomeBox");
    if (welcomeBox) welcomeBox.remove();
}

function scrollToBottom() {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 50);

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 250);
}

function keepKeyboardOpen() {
    input.focus({ preventScroll: true });
}

async function sendMessage() {
    const message = input.value.trim();
    if (message === "") return;

    removeWelcome();

    chatBox.innerHTML += `
        <div class="message-row user-row">
            <div class="user-message">${message}</div>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();

    const typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="message-row bot-row" id="${typingId}">
            <div class="bot-message typing">Thinking...</div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">${data.reply}</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();

    } catch (error) {
        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">Error connecting to server</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();
    }
}
</script>

</body>
</html>
