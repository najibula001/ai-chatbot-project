<!DOCTYPE html>
<html>
<head>
    <title>Velix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: white;
        }

        body {
            height: 100dvh;
        }

        .app {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .header {
            height: 56px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
            font-size: 20px;
            font-weight: bold;
            background: #000;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            min-height: 0;
        }

        .chat-inner {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }

        .welcome {
            text-align: center;
            margin-top: 100px;
            color: #ddd;
        }

        .welcome h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .welcome p {
            color: #aaa;
            font-size: 16px;
        }

        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 24px;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-message {
            max-width: 70%;
            background: #2f2f2f;
            color: white;
            padding: 13px 18px;
            border-radius: 24px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bot-message {
            max-width: 80%;
            color: white;
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing {
            color: #aaa;
            font-style: italic;
        }

        .input-area {
            flex-shrink: 0;
            padding: 12px 16px 18px;
            background: #000;
        }

        .input-inner {
            max-width: 850px;
            margin: 0 auto;
        }

        .input-box {
            width: 100%;
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border: 1px solid #555;
            border-radius: 28px;
            padding: 6px;
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
            padding: 13px 14px;
        }

        input::placeholder {
            color: #aaa;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: white;
            color: black;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .header {
                height: 50px;
                justify-content: flex-start;
                padding-left: 16px;
                font-size: 20px;
            }

            .chat-box {
                padding: 18px 16px;
            }

            .welcome {
                margin-top: 80px;
            }

            .welcome h1 {
                font-size: 26px;
            }

            .welcome p {
                font-size: 14px;
            }

            .message-row {
                margin-bottom: 22px;
            }

            .user-message {
                max-width: 82%;
                font-size: 16px;
                padding: 13px 17px;
                border-radius: 22px;
            }

            .bot-message {
                max-width: 92%;
                font-size: 16px;
            }

            .input-area {
                padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            }

            .input-box {
                border-radius: 26px;
            }

            input {
                font-size: 16px;
                padding: 12px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
            }

            .footer-note {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">Velix</div>

    <div id="chatBox" class="chat-box">
        <div class="chat-inner" id="chatInner">
            <div class="welcome" id="welcomeBox">
                <h1>How can Velix help today?</h1>
                <p>Ask anything. Velix is ready.</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-inner">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message Velix..." />
                <button class="send-btn" id="sendBtn">↑</button>
            </div>
            <div class="footer-note">Velix may generate inaccurate information. Verify important details.</div>
        </div>
    </div>

</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const chatInner = document.getElementById("chatInner");
const sendBtn = document.getElementById("sendBtn");

sendBtn.addEventListener("pointerdown", function(event) {
    event.preventDefault();
});

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

function removeWelcome() {
    const welcomeBox = document.getElementById("welcomeBox");
    if (welcomeBox) welcomeBox.remove();
}

function scrollToBottom() {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 50);

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 250);
}

function keepKeyboardOpen() {
    input.focus({ preventScroll: true });
}

async function sendMessage() {
    const message = input.value.trim();

    if (message === "") return;

    removeWelcome();

    chatInner.innerHTML += `
        <div class="message-row user-row">
            <div class="user-message">${message}</div>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();

    const typingId = "typing-" + Date.now();

    chatInner.innerHTML += `
        <div class="message-row bot-row" id="${typingId}">
            <div class="bot-message typing">Velix is thinking...</div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId)?.remove();

        chatInner.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">${data.reply}</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();

    } catch (error) {
        document.getElementById(typingId)?.remove();

        chatInner.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">Error connecting to server</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();
    }
}
</script>

</body>
</html>
