<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        .send-btn {
            background: #007bff;
            color: white;
        }

        .clear-btn {
            background: red;
            color: white;
        }

        .message {
            max-width: 70%;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 10px;
        }

        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #e4e6eb;
            color: black;
            align-self: flex-start;
        }

        .typing {
            font-style: italic;
            color: gray;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a message..." />
        <button class="send-btn" onclick="sendMessage()">Send</button>
        <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>

</div>

<script>

const input = document.getElementById("userInput");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

async function sendMessage() {
    const message = input.value.trim();

    if (message === "") return;

    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `<div class="message user">${message}</div>`;

    input.value = "";
    input.focus();

    // 👇 Typing indicator
    const typingId = "typing-" + Date.now();
    chatBox.innerHTML += `<div id="${typingId}" class="message bot typing">Typing...</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        // Remove typing...
        document.getElementById(typingId).remove();

        chatBox.innerHTML += `<div class="message bot">${data.reply}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById(typingId).remove();
        chatBox.innerHTML += `<div class="message bot">Error connecting to server</div>`;
    }
}

function clearChat() {
    document.getElementById("chatBox").innerHTML = "";
}

</script>

</body>
</html>
