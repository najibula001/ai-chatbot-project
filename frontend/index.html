<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Velix Legal</title>

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
    }
    
    body{
    background:linear-gradient(180deg,#07110d,#050807);
    color:white;
    height:100vh;
    overflow:hidden;
    display:flex;
    }
    
    .sidebar{
    width:300px;
    background:#0a0f0d;
    border-right:1px solid rgba(124,255,196,0.08);
    padding:22px;
    display:flex;
    flex-direction:column;
    backdrop-filter:blur(12px);
    }
    
    .logo{
    font-size:34px;
    font-weight:900;
    margin-bottom:45px;
    letter-spacing:-1px;
    }
    
    .logo span{
    color:#7cffc4;
    }
    
    .sidebar-btn{
    background:transparent;
    border:none;
    color:white;
    padding:16px 14px;
    border-radius:14px;
    cursor:pointer;
    font-size:18px;
    text-align:left;
    margin-bottom:12px;
    transition:0.25s;
    }
    
    .sidebar-btn:hover{
    background:#132019;
    }
    
    .history-title{
    margin-top:20px;
    font-size:15px;
    color:#9c9c9c;
    margin-bottom:16px;
    }
    
    .history-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow-y:auto;
    }
    
    .history-item{
    background:#101614;
    padding:14px;
    border-radius:14px;
    cursor:pointer;
    font-size:15px;
    border:1px solid rgba(124,255,196,0.08);
    transition:0.25s;
    }
    
    .history-item:hover{
    background:#15211c;
    border-color:#29513f;
    }
    
    .main{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    }
    
    .topbar{
    height:82px;
    border-bottom:1px solid rgba(124,255,196,0.08);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    font-weight:900;
    background:rgba(5,10,8,0.95);
    backdrop-filter:blur(10px);
    }
    
    .topbar span{
    color:#7cffc4;
    }
    
    .hero{
    flex:1;
    overflow-y:auto;
    padding:45px;
    display:flex;
    flex-direction:column;
    align-items:center;
    }
    
    .hero-title{
    font-size:64px;
    font-weight:900;
    margin-top:90px;
    margin-bottom:18px;
    text-align:center;
    letter-spacing:-2px;
    }
    
    .hero-sub{
    font-size:22px;
    color:#a8a8a8;
    margin-bottom:50px;
    text-align:center;
    }
    
    .quick-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    width:950px;
    max-width:100%;
    margin-bottom:60px;
    }
    
    .quick-card{
    background:linear-gradient(180deg,#121614,#0d1110);
    border:1px solid rgba(124,255,196,0.08);
    padding:28px;
    border-radius:22px;
    cursor:pointer;
    font-size:20px;
    transition:0.25s;
    box-shadow:0 0 30px rgba(0,255,170,0.03);
    }
    
    .quick-card:hover{
    background:#16211d;
    border-color:#2d5f49;
    transform:translateY(-2px);
    }
    
    .chat-container{
    width:100%;
    max-width:1100px;
    }
    
    .message-row{
    display:flex;
    margin-bottom:28px;
    }
    
    .user-row{
    justify-content:flex-end;
    }
    
    .bot-row{
    justify-content:flex-start;
    }
    
    .user-message{
    background:#1c2d25;
    padding:20px 24px;
    border-radius:22px;
    max-width:75%;
    font-size:19px;
    line-height:1.9;
    border:1px solid rgba(124,255,196,0.08);
    }
    
    .bot-message{
    background:linear-gradient(180deg,#0e1814,#09100d);
    border:1px solid rgba(124,255,196,0.12);
    padding:40px;
    border-radius:28px;
    max-width:92%;
    font-size:20px;
    line-height:2.1;
    box-shadow:0 0 45px rgba(0,255,170,0.05);
    }
    
    .bot-message h1,
    .bot-message h2,
    .bot-message h3{
    margin-top:48px;
    margin-bottom:26px;
    color:#7cffc4;
    font-size:44px;
    font-weight:900;
    line-height:1.2;
    letter-spacing:-1px;
    }
    
    .bot-message p{
    margin-bottom:24px;
    font-size:20px;
    line-height:2.1;
    color:#f1f1f1;
    }
    
    .bot-message ul{
    padding-left:34px;
    margin-bottom:28px;
    }
    
    .bot-message li{
    margin-bottom:18px;
    font-size:20px;
    line-height:2;
    }
    
    .bot-message strong{
    color:#7cffc4;
    font-weight:900;
    font-size:24px;
    }
    
    .input-area{
    padding:26px;
    border-top:1px solid rgba(124,255,196,0.08);
    background:#07110d;
    display:flex;
    justify-content:center;
    }
    
    .input-box{
    width:100%;
    max-width:1100px;
    background:#181818;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    display:flex;
    align-items:center;
    padding:10px;
    box-shadow:0 0 30px rgba(0,255,170,0.03);
    }
    
    .input-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:white;
    font-size:19px;
    padding:20px;
    }
    
    .send-btn{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    background:#ffffff;
    color:black;
    font-size:24px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
    }
    
    .send-btn:hover{
    transform:scale(1.05);
    }
    
    .login-btn{
    margin-top:auto;
    background:#101614;
    border:1px solid rgba(124,255,196,0.08);
    padding:18px;
    border-radius:16px;
    color:white;
    font-size:19px;
    cursor:pointer;
    transition:0.2s;
    }
    
    .login-btn:hover{
    background:#18231e;
    }
    
    ::-webkit-scrollbar{
    width:8px;
    }
    
    ::-webkit-scrollbar-thumb{
    background:#1f352c;
    border-radius:10px;
    }
    
    @media(max-width:900px){
    
    .sidebar{
    display:none;
    }
    
    .hero-title{
    font-size:44px;
    }
    
    .quick-grid{
    grid-template-columns:1fr;
    }
    
    .bot-message{
    max-width:100%;
    padding:26px;
    }
    
    .bot-message h1,
    .bot-message h2,
    .bot-message h3{
    font-size:34px;
    }
    
    }
    </style>
</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">Velix Legal ⚖️</div>

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>

<div class="history-title">
Recent Chats
</div>

<div class="history" id="history"></div>
</div>

<div class="main">

<div class="topbar">
<div class="brand">Velix Legal</div>

<button class="login-btn" onclick="openModal()">
Login
</button>
</div>

<div class="chat-area" id="chatArea">

<div class="welcome">
<h1>Legal guidance for India.</h1>
<p>
Ask about cyber crime, FIR, consumer complaints,
property disputes, labour rights and more.
</p>
</div>

</div>

<div class="input-area">

<div class="input-box">

<textarea
id="userInput"
placeholder="Ask your legal question..."
></textarea>

<button class="send-btn" onclick="sendMessage()">
↑
</button>

</div>

</div>

</div>

</div>

<!-- LOGIN MODAL -->

<div class="modal" id="authModal">

<div class="modal-box">

<h2 id="modalTitle">Login</h2>

<p>
Create account or login to save your legal history.
</p>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="handleAuth()" id="authBtn">
Login
</button>

<div class="switch-auth" onclick="switchMode()" id="switchText">
Don't have an account? Signup
</div>

<div class="close-modal" onclick="closeModal()">
Close
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyBu_Gq_06W1_73Qhsbe6vwP22O9-J8yovI",

authDomain: "velix-legal-app.firebaseapp.com",

projectId: "velix-legal-app",

storageBucket: "velix-legal-app.firebasestorage.app",

messagingSenderId: "837271467656",

appId: "1:837271467656:web:f6cde4d97e14e391d5513d"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

let signupMode = false;

window.openModal = function(){
document.getElementById("authModal").style.display="flex";
}

window.closeModal = function(){
document.getElementById("authModal").style.display="none";
}

window.switchMode = function(){

signupMode = !signupMode;

document.getElementById("modalTitle").innerText =
signupMode ? "Create Account" : "Login";

document.getElementById("authBtn").innerText =
signupMode ? "Signup" : "Login";

document.getElementById("switchText").innerText =
signupMode
? "Already have an account? Login"
: "Don't have an account? Signup";
}

window.handleAuth = async function(){

const email = document.getElementById("email").value;

const password = document.getElementById("password").value;

try{

if(signupMode){

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert("Account created successfully!");

}else{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login successful!");

}

closeModal();

}catch(err){

alert(err.message);

}

}

window.sendMessage = async function(){

const input = document.getElementById("userInput");

const text = input.value.trim();

if(!text) return;

const chatArea = document.getElementById("chatArea");

chatArea.innerHTML += `
<div class="message-row user-row">
<div class="message user-message">
${text}
</div>
</div>
`;

input.value="";

chatArea.innerHTML += `
<div class="message-row bot-row" id="loading">
<div class="message bot-message">
Thinking...
</div>
</div>
`;

chatArea.scrollTop = chatArea.scrollHeight;

try{

const response = await fetch(
"https://ai-chatbot-project-1ku7.onrender.com/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
}
);

const data = await response.json();

document.getElementById("loading").remove();

chatArea.innerHTML += `
<div class="message-row bot-row">
<div class="message bot-message">
${formatReply(data.reply)}
</div>
</div>
`;

saveHistory(text);

chatArea.scrollTop = chatArea.scrollHeight;

}catch(err){

document.getElementById("loading").remove();

alert("Server error.");

}

}

function formatReply(text){

return text
.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
.replace(/\n/g,"<br>");

}

function saveHistory(question){

const history = document.getElementById("history");

const item = document.createElement("div");

item.className="history-item";

item.innerText =
question.substring(0,40) + "...";

history.prepend(item);

}

window.newChat = function(){

document.getElementById("chatArea").innerHTML = `
<div class="welcome">
<h1>Legal guidance for India.</h1>
<p>
Ask about cyber crime, FIR, consumer complaints,
property disputes, labour rights and more.
</p>
</div>
`;

}

</script>

</body>
</html>
