<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #212121;
            color: #ececec;
        }

        body {
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: #171717;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2f2f2f;
        }

        .new-chat {
            background: transparent;
            color: #ececec;
            border: 1px solid #3a3a3a;
            padding: 12px;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .sidebar-title {
            font-size: 13px;
            color: #b4b4b4;
            margin: 10px 0;
        }

        .chat-history-item {
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
        }

        .topbar {
            height: 55px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #2f2f2f;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 25px 20px;
            min-height: 0;
        }

        .welcome {
            max-width: 750px;
            margin: 80px auto 0;
            text-align: center;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .welcome p {
            color: #b4b4b4;
        }

        .message-row {
            width: 100%;
            margin-bottom: 22px;
        }

        .message-wrapper {
            max-width: 750px;
            margin: 0 auto;
            display: flex;
            gap: 14px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 14px;
        }

        .user-avatar {
            background: #10a37f;
        }

        .bot-avatar {
            background: #444654;
        }

        .message {
            line-height: 1.6;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding-top: 4px;
        }

        .input-container {
            padding: 15px 20px 18px;
            background: #212121;
            flex-shrink: 0;
        }

        .input-box {
            max-width: 750px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: #303030;
            border: 1px solid #4a4a4a;
            border-radius: 16px;
            padding: 8px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ececec;
            font-size: 15px;
            padding: 12px;
        }

        input::placeholder {
            color: #9b9b9b;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: #ececec;
            color: #212121;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .footer-note {
            text-align: center;
            color: #8e8e8e;
            font-size: 12px;
            margin-top: 8px;
        }

        .typing {
            color: #b4b4b4;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            body {
                display: block;
            }

            .main {
                width: 100%;
                height: 100dvh;
            }

            .topbar {
                height: 48px;
                font-size: 16px;
                padding: 0 15px;
            }

            .chat-box {
                padding: 14px 12px;
            }

            .welcome {
                margin-top: 35px;
                padding: 0 15px;
            }

            .welcome h1 {
                font-size: 24px;
            }

            .message-wrapper {
                gap: 10px;
            }

            .avatar {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .message {
                font-size: 14px;
            }

            .input-container {
                padding: 8px 10px calc(10px + env(safe-area-inset-bottom));
            }

            .input-box {
                padding: 6px;
                border-radius: 14px;
            }

            input {
                font-size: 14px;
                padding: 11px;
            }

            .footer-note {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <button class="new-chat" onclick="clearChat()">+ New Chat</button>
    <div class="sidebar-title">Recent</div>
    <div class="chat-history-item">AI Chatbot Project</div>
</div>

<div class="main">
    <div class="topbar">AI Chatbot</div>

    <div id="chatBox" class="chat-box">
        <div class="welcome" id="welcomeBox">
            <h1>How can I help you today?</h1>
            <p>Ask anything and get an AI-generated response.</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Message AI Chatbot..." />
            <button class="send-btn" id="sendBtn">↑</button>
        </div>
        <div class="footer-note">
            AI Chatbot may generate incorrect information. Verify important answers.
        </div>
    </div>
</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const sendBtn = document.getElementById("sendBtn");

// VERY IMPORTANT: prevents mobile keyboard from closing
sendBtn.addEventListener("pointerdown", function(event) {
    event.preventDefault();
});

sendBtn.addEventListener("click", function() {
    sendMessage();
});

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    requestAnimationFrame(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 100);

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 300);
}

function keepKeyboardOpen() {
    input.focus({ preventScroll: true });
}

function removeWelcome() {
    const welcomeBox = document.getElementById("welcomeBox");
    if (welcomeBox) welcomeBox.remove();
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    removeWelcome();

    chatBox.innerHTML += `
        <div class="message-row">
            <div class="message-wrapper">
                <div class="avatar user-avatar">U</div>
                <div class="message">${message}</div>
            </div>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();

    const typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="message-row" id="${typingId}">
            <div class="message-wrapper">
                <div class="avatar bot-avatar">AI</div>
                <div class="message typing">Thinking...</div>
            </div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row">
                <div class="message-wrapper">
                    <div class="avatar bot-avatar">AI</div>
                    <div class="message">${data.reply}</div>
                </div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();

    } catch (error) {
        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row">
                <div class="message-wrapper">
                    <div class="avatar bot-avatar">AI</div>
                    <div class="message">Error connecting to server</div>
                </div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();
    }
}

function clearChat() {
    chatBox.innerHTML = `
        <div class="welcome" id="welcomeBox">
            <h1>How can I help you today?</h1>
            <p>Ask anything and get an AI-generated response.</p>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();
    scrollToBottom();
}
</script>

</body>
</html>
