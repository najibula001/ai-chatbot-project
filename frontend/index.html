<!DOCTYPE html>
<html>
<head>
    <title>My AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #343541;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #202123;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #444654;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            height: calc(100vh - 70px);
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message-row {
            display: flex;
            margin-bottom: 15px;
        }

        .message-row.user-row {
            justify-content: flex-end;
        }

        .message-row.bot-row {
            justify-content: flex-start;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user {
            background: #10a37f;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot {
            background: #444654;
            color: white;
            border-bottom-left-radius: 4px;
        }

        .typing {
            color: #ccc;
            font-style: italic;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #343541;
            border-top: 1px solid #444654;
        }

        input {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #565869;
            background: #40414f;
            color: white;
            outline: none;
            font-size: 15px;
        }

        input::placeholder {
            color: #c5c5c5;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .send-btn {
            background: #10a37f;
            color: white;
        }

        .clear-btn {
            background: #ef4444;
            color: white;
        }

        button:hover {
            opacity: 0.85;
        }

        @media (max-width: 600px) {
            .header {
                font-size: 18px;
                padding: 12px;
            }

            .chat-box {
                padding: 12px;
            }

            .message {
                max-width: 90%;
                font-size: 14px;
                padding: 10px 13px;
            }

            .input-area {
                padding: 10px;
                gap: 6px;
            }

            input {
                font-size: 14px;
                padding: 12px;
            }

            button {
                padding: 10px 12px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<div class="header">
    My AI Chatbot 🤖
</div>

<div class="chat-container">

    <div id="chatBox" class="chat-box">
        <div class="message-row bot-row">
            <div class="message bot">Hello! I am your AI chatbot. How can I help you today?</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." />
        <button class="send-btn" onclick="sendMessage()">Send</button>
        <button class="clear-btn" onclick="clearChat()">Clear</button>
    </div>

</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
});

async function sendMessage() {
    const message = input.value.trim();

    if (message === "") return;

    chatBox.innerHTML += `
        <div class="message-row user-row">
            <div class="message user">${message}</div>
        </div>
    `;

    input.value = "";
    input.focus();

    const typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="message-row bot-row" id="${typingId}">
            <div class="message bot typing">Typing...</div>
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId).remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="message bot">${data.reply}</div>
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {
        document.getElementById(typingId).remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="message bot">Error connecting to server</div>
            </div>
        `;
    }
}

function clearChat() {
    chatBox.innerHTML = `
        <div class="message-row bot-row">
            <div class="message bot">Hello! I am your AI chatbot. How can I help you today?</div>
        </div>
    `;
}
</script>

</body>
</html>
