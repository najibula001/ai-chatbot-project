<!DOCTYPE html>
<html>
<head>
    <title>Velix Legal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #07110d;
            color: #f3f4f6;
        }

        body {
            height: 100dvh;
        }

        .app {
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #07110d 0%, #0b1f17 100%);
        }

        .header {
            height: 58px;
            flex-shrink: 0;
            display: grid;
            grid-template-columns: 90px 1fr 90px;
            align-items: center;
            border-bottom: 1px solid #1f3b2e;
            background: rgba(5, 15, 11, 0.95);
            color: #d7dde0;
            padding: 0 12px;
        }

        .header-title {
            text-align: center;
            font-size: 21px;
            font-weight: bold;
        }

        .header-title span {
            color: #86efac;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #2f5f49;
            color: #d7dde0;
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-btn:hover {
            background: #163d2d;
        }

        .right-btn {
            justify-self: end;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
            min-height: 0;
        }

        .chat-inner {
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
        }

        .welcome {
            text-align: center;
            margin-top: 60px;
            color: #e5e7eb;
        }

        .welcome h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .welcome p {
            color: #b7c2bd;
            font-size: 16px;
        }

        .quick-actions {
            max-width: 760px;
            margin: 28px auto 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .quick-btn {
            background: rgba(18, 46, 34, 0.9);
            border: 1px solid #2f5f49;
            color: #e5e7eb;
            padding: 14px;
            border-radius: 14px;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
        }

        .quick-btn:hover {
            background: #163d2d;
        }

        .message-row {
            display: flex;
            width: 100%;
            margin-bottom: 24px;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-message {
            max-width: 70%;
            background: #1f3b2e;
            color: white;
            padding: 13px 18px;
            border-radius: 24px;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bot-message {
            max-width: 82%;
            color: #f3f4f6;
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing {
            color: #a7b5af;
            font-style: italic;
        }

        .input-area {
            flex-shrink: 0;
            padding: 12px 16px 18px;
            background: rgba(5, 15, 11, 0.98);
            border-top: 1px solid #1f3b2e;
        }

        .input-inner {
            max-width: 880px;
            margin: 0 auto;
        }

        .input-box {
            width: 100%;
            display: flex;
            align-items: center;
            background: #10241b;
            border: 1px solid #3b5f4e;
            border-radius: 28px;
            padding: 6px;
        }

        input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
            padding: 13px 14px;
        }

        input::placeholder {
            color: #a7b5af;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: #d7dde0;
            color: #07110d;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #93a39b;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .header {
                height: 50px;
                grid-template-columns: 70px 1fr 70px;
                padding: 0 8px;
            }

            .header-title {
                font-size: 18px;
            }

            .nav-btn {
                font-size: 12px;
                padding: 7px 8px;
            }

            .chat-box {
                padding: 18px 16px;
            }

            .welcome {
                margin-top: 42px;
            }

            .welcome h1 {
                font-size: 25px;
            }

            .welcome p {
                font-size: 14px;
            }

            .quick-actions {
                grid-template-columns: 1fr;
                gap: 10px;
                margin-top: 22px;
            }

            .quick-btn {
                padding: 13px;
                font-size: 14px;
            }

            .user-message {
                max-width: 82%;
                font-size: 16px;
                padding: 13px 17px;
                border-radius: 22px;
            }

            .bot-message {
                max-width: 92%;
                font-size: 16px;
            }

            .input-area {
                padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            }

            .footer-note {
                display: none;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">
        <button class="nav-btn" onclick="goBack()">← Back</button>
        <div class="header-title">Velix <span>Legal ⚖️</span></div>
        <button class="nav-btn right-btn" onclick="newChat()">+ New</button>
    </div>

    <div id="chatBox" class="chat-box">
        <div class="chat-inner" id="chatInner">
            <div class="welcome" id="welcomeBox">
                <h1>Describe your legal issue</h1>
                <p>Get simple legal guidance based on Indian law.</p>

                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickMessage('I was cheated in an online payment. What legal steps can I take in India?')">💻 Cyber Crime Help</button>
                    <button class="quick-btn" onclick="quickMessage('My employer has not paid my salary. What can I do legally in India?')">💼 Labour Rights</button>
                    <button class="quick-btn" onclick="quickMessage('A shop sold me a defective product. How can I file a consumer complaint?')">🛒 Consumer Complaint</button>
                    <button class="quick-btn" onclick="quickMessage('What should I do if police refuse to file my FIR?')">👮 Police / FIR Rights</button>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-inner">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Ask your legal question..." />
                <button class="send-btn" id="sendBtn">↑</button>
            </div>
            <div class="footer-note">
                Velix Legal provides general legal information, not professional legal advice. Consult a qualified advocate for serious matters.
            </div>
        </div>
    </div>

</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const chatInner = document.getElementById("chatInner");
const sendBtn = document.getElementById("sendBtn");

const BACKEND_URL = "https://ai-chatbot-project-1ku7.onrender.com";

sendBtn.addEventListener("pointerdown", function(event) {
    event.preventDefault();
});

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

function homeScreen() {
    chatInner.innerHTML = `
        <div class="welcome" id="welcomeBox">
            <h1>Describe your legal issue</h1>
            <p>Get simple legal guidance based on Indian law.</p>

            <div class="quick-actions">
                <button class="quick-btn" onclick="quickMessage('I was cheated in an online payment. What legal steps can I take in India?')">💻 Cyber Crime Help</button>
                <button class="quick-btn" onclick="quickMessage('My employer has not paid my salary. What can I do legally in India?')">💼 Labour Rights</button>
                <button class="quick-btn" onclick="quickMessage('A shop sold me a defective product. How can I file a consumer complaint?')">🛒 Consumer Complaint</button>
                <button class="quick-btn" onclick="quickMessage('What should I do if police refuse to file my FIR?')">👮 Police / FIR Rights</button>
            </div>
        </div>
    `;
    input.value = "";
    scrollToBottom();
}

async function resetBackendMemory() {
    try {
        await fetch(`${BACKEND_URL}/reset`, {
            method: "POST"
        });
    } catch (error) {
        console.log("Could not reset backend memory");
    }
}

async function goBack() {
    homeScreen();
}

async function newChat() {
    await resetBackendMemory();
    homeScreen();
}

function quickMessage(text) {
    input.value = text;
    sendMessage();
}

function removeWelcome() {
    const welcomeBox = document.getElementById("welcomeBox");
    if (welcomeBox) welcomeBox.remove();
}

function scrollToBottom() {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 50);

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 250);
}

function keepKeyboardOpen() {
    input.focus({ preventScroll: true });
}

async function sendMessage() {
    const message = input.value.trim();

    if (message === "") return;

    removeWelcome();

    chatInner.innerHTML += `
        <div class="message-row user-row">
            <div class="user-message">${message}</div>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();

    const typingId = "typing-" + Date.now();

    chatInner.innerHTML += `
        <div class="message-row bot-row" id="${typingId}">
            <div class="bot-message typing">Velix Legal is reviewing your issue...</div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch(`${BACKEND_URL}/chat`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId)?.remove();

        chatInner.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">${data.reply}</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();

    } catch (error) {
        document.getElementById(typingId)?.remove();

        chatInner.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">Error connecting to server</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();
    }
}
</script>

</body>
</html>
