<!DOCTYPE html>
<html>
<head>
    <title>AI Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }

        body {
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: #171717;
            padding: 12px;
            border-right: 1px solid #2f2f2f;
        }

        .new-chat {
            background: transparent;
            color: white;
            border: 1px solid #3a3a3a;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-size: 14px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            background: #000;
        }

        .topbar {
            height: 55px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #1f1f1f;
            font-size: 18px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            min-height: 0;
        }

        .welcome {
            text-align: center;
            margin-top: 100px;
            color: white;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .welcome p {
            color: #aaa;
        }

        .message-row {
            width: 100%;
            display: flex;
            margin-bottom: 26px;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .user-message {
            max-width: 70%;
            background: #2f2f2f;
            color: white;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .bot-message {
            max-width: 75%;
            color: white;
            font-size: 17px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .typing {
            color: #aaa;
            font-style: italic;
        }

        .input-container {
            padding: 12px 18px calc(14px + env(safe-area-inset-bottom));
            background: #000;
            flex-shrink: 0;
        }

        .input-box {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            background: #2f2f2f;
            border: 1px solid #555;
            border-radius: 28px;
            padding: 6px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 13px 14px;
        }

        input::placeholder {
            color: #aaa;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: white;
            color: black;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            body {
                display: block;
            }

            .sidebar {
                display: none;
            }

            .main {
                width: 100%;
                height: 100dvh;
            }

            .topbar {
                height: 50px;
                font-size: 16px;
                padding: 0 16px;
            }

            .chat-box {
                padding: 18px 16px;
            }

            .welcome {
                margin-top: 70px;
            }

            .welcome h1 {
                font-size: 25px;
            }

            .user-message {
                max-width: 82%;
                font-size: 16px;
                padding: 13px 17px;
                border-radius: 22px;
            }

            .bot-message {
                max-width: 92%;
                font-size: 16px;
            }

            .message-row {
                margin-bottom: 24px;
            }

            .input-container {
                padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
            }

            .input-box {
                border-radius: 26px;
            }

            input {
                font-size: 16px;
                padding: 12px;
            }

            .send-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>

<body>

<div class="sidebar">
    <button class="new-chat" onclick="clearChat()">+ New Chat</button>
</div>

<div class="main">

    <div class="topbar">AI Chatbot</div>

    <div id="chatBox" class="chat-box">
        <div class="welcome" id="welcomeBox">
            <h1>How can I help you today?</h1>
            <p>Ask anything and get an AI-generated response.</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Ask ChatGPT" />
            <button class="send-btn" id="sendBtn">↑</button>
        </div>
    </div>

</div>

<script>
const input = document.getElementById("userInput");
const chatBox = document.getElementById("chatBox");
const sendBtn = document.getElementById("sendBtn");

sendBtn.addEventListener("pointerdown", function(event) {
    event.preventDefault();
});

sendBtn.addEventListener("click", function() {
    sendMessage();
});

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 50);

    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 250);
}

function keepKeyboardOpen() {
    input.focus({ preventScroll: true });
}

function removeWelcome() {
    const welcomeBox = document.getElementById("welcomeBox");
    if (welcomeBox) welcomeBox.remove();
}

async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    removeWelcome();

    chatBox.innerHTML += `
        <div class="message-row user-row">
            <div class="user-message">${message}</div>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();

    const typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="message-row bot-row" id="${typingId}">
            <div class="bot-message typing">Thinking...</div>
        </div>
    `;

    scrollToBottom();

    try {
        const response = await fetch("https://ai-chatbot-project-1ku7.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await response.json();

        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">${data.reply}</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();

    } catch (error) {
        document.getElementById(typingId)?.remove();

        chatBox.innerHTML += `
            <div class="message-row bot-row">
                <div class="bot-message">Error connecting to server</div>
            </div>
        `;

        keepKeyboardOpen();
        scrollToBottom();
    }
}

function clearChat() {
    chatBox.innerHTML = `
        <div class="welcome" id="welcomeBox">
            <h1>How can I help you today?</h1>
            <p>Ask anything and get an AI-generated response.</p>
        </div>
    `;

    input.value = "";
    keepKeyboardOpen();
    scrollToBottom();
}
</script>

</body>
</html>
